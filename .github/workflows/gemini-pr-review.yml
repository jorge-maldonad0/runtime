name: Gemini PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Allows manual triggering

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so git diff can calculate cleanly

      - name: Run Gemini Code Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-2.5-pro"
          context-lines: 10
          add-files: "true" # Pass the full contents of changed files, not just the raw diff
