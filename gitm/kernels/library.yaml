# Curated intervention library for vLLM decode workloads.
#
# Every entry has applicability, an expected delta range with a cited source,
# and a safety gate. I2 curates entries in W2 (GITM-031 easy, GITM-032 medium,
# GITM-033 harder); every entry carries review: null until Adit signs it off in
# the GITM-010 library review. Expected deltas are pre-review estimates from the
# cited source, not measured on our workloads — the replay engine and the
# rollback-gated live apply produce the real numbers.

interventions:
  # --- Tier 1: easy levers (GITM-031) ---------------------------------------
  - name: kv_cache_block_size_16
    summary: Set PagedAttention block size to 16 for short-context decode.
    knob: block_size
    value: 16
    applies_to_kernels: [paged_attention, attn_score_value]
    expected_delta_mean: 0.05
    expected_delta_lo: 0.02
    expected_delta_hi: 0.10
    source: https://docs.vllm.ai/en/latest/configuration/optimization.html
    applicability:
      workloads: [vllm-decode]
      requires_dtype: [fp16, bf16]
      max_kv_cache_len: 4096
    safety:
      tier: low_risk
      requires_rollback_window_s: 60
      notes: Reversible at warm start; no persisted state.
    review: null

  - name: kv_cache_dtype_fp8
    summary: Store the KV cache in fp8 to roughly double cache capacity.
    knob: kv_cache_dtype
    value: fp8
    applies_to_kernels: [paged_attention, kv_cache_write, kv_cache_read]
    expected_delta_mean: 0.06
    expected_delta_lo: 0.00
    expected_delta_hi: 0.12
    source: https://docs.vllm.ai/en/latest/configuration/optimization.html
    applicability:
      workloads: [vllm-decode]
      requires_dtype: [fp16, bf16]
      requires_hardware: [A100, H100, L40S]
    safety:
      tier: moderate
      requires_rollback_window_s: 120
      notes: fp8 KV can shift logits slightly; gate on an accuracy sentinel before keep.
    review: null

  - name: max_num_batched_tokens_8192
    summary: Raise the per-step token budget to 8192 to fill decode batches.
    knob: max_num_batched_tokens
    value: 8192
    applies_to_kernels: []
    expected_delta_mean: 0.05
    expected_delta_lo: 0.01
    expected_delta_hi: 0.10
    source: https://docs.vllm.ai/en/latest/serving/engine_args.html
    applicability:
      workloads: [vllm-decode]
    safety:
      tier: moderate
      forbid_if_oom_history: true
      requires_rollback_window_s: 120
      notes: Larger batches raise peak activation memory; watch for OOM.
    review: null

  - name: max_num_seqs_256
    summary: Allow up to 256 concurrent sequences to raise decode concurrency.
    knob: max_num_seqs
    value: 256
    applies_to_kernels: []
    expected_delta_mean: 0.04
    expected_delta_lo: 0.00
    expected_delta_hi: 0.09
    source: https://docs.vllm.ai/en/latest/serving/engine_args.html
    applicability:
      workloads: [vllm-decode]
    safety:
      tier: moderate
      forbid_if_oom_history: true
      requires_rollback_window_s: 120
      notes: Interacts with gpu_memory_utilization; tune one lever at a time.
    review: null

  - name: swap_space_4gib
    summary: Give the block manager 4 GiB CPU swap to avoid preemption stalls.
    knob: swap_space
    value: 4
    applies_to_kernels: []
    expected_delta_mean: 0.03
    expected_delta_lo: -0.01
    expected_delta_hi: 0.07
    source: https://docs.vllm.ai/en/latest/serving/engine_args.html
    applicability:
      workloads: [vllm-decode]
    safety:
      tier: low_risk
      requires_rollback_window_s: 60
      notes: Swap I/O can regress latency-bound workloads; keep only on a positive delta.
    review: null

  - name: gpu_memory_utilization_092
    summary: Raise gpu_memory_utilization to 0.92 to permit larger batch slots.
    knob: gpu_memory_utilization
    value: 0.92
    applies_to_kernels: []
    expected_delta_mean: 0.04
    expected_delta_lo: 0.01
    expected_delta_hi: 0.08
    source: https://docs.vllm.ai/en/latest/configuration/optimization.html
    applicability:
      workloads: [vllm-decode]
    safety:
      tier: moderate
      forbid_if_oom_history: true
      requires_rollback_window_s: 120
      notes: Watch for OOM during long-running decode; rollback to 0.85 on first OOM.
    review: null

  # --- Tier 2: medium levers (GITM-032) -------------------------------------
  - name: enable_chunked_prefill
    summary: Chunk prefill so it overlaps with decode instead of stalling it.
    knob: enable_chunked_prefill
    value: true
    applies_to_kernels: [prefill, paged_attention]
    expected_delta_mean: 0.08
    expected_delta_lo: 0.02
    expected_delta_hi: 0.15
    source: https://docs.vllm.ai/en/latest/configuration/optimization.html
    applicability:
      workloads: [vllm-decode]
    safety:
      tier: moderate
      requires_rollback_window_s: 120
      notes: Changes scheduling shape; validate the stream-concurrency invariant after apply.
    review: null

  - name: enable_prefix_caching
    summary: Cache shared prompt prefixes to skip repeated prefill work.
    knob: enable_prefix_caching
    value: true
    applies_to_kernels: [prefill, kv_cache_write]
    expected_delta_mean: 0.10
    expected_delta_lo: 0.00
    expected_delta_hi: 0.30
    source: https://docs.vllm.ai/en/latest/features/automatic_prefix_caching.html
    applicability:
      workloads: [vllm-decode]
      other: Only helps when prompts share long common prefixes; near-zero otherwise.
    safety:
      tier: low_risk
      requires_rollback_window_s: 60
      notes: Pure cache; safe to enable, delta highly workload-dependent.
    review: null

  - name: speculative_decode_ngram_5
    summary: Enable 5-token n-gram speculative decoding to cut decode steps.
    knob: num_speculative_tokens
    value: 5
    applies_to_kernels: [decode, paged_attention]
    expected_delta_mean: 0.12
    expected_delta_lo: -0.05
    expected_delta_hi: 0.30
    source: https://docs.vllm.ai/en/latest/features/spec_decode.html
    applicability:
      workloads: [vllm-decode]
      other: Gains depend on acceptance rate; can regress on low-redundancy outputs.
    safety:
      tier: high_risk
      requires_qualification_commit: true
      requires_rollback_window_s: 180
      notes: Verify output-equivalence sentinel; roll back if acceptance rate < 0.3.
    review: null

  - name: scheduling_policy_priority
    summary: Switch the scheduler to priority policy for mixed-SLO traffic.
    knob: scheduling_policy
    value: priority
    applies_to_kernels: []
    expected_delta_mean: 0.03
    expected_delta_lo: -0.02
    expected_delta_hi: 0.08
    source: https://docs.vllm.ai/en/latest/serving/engine_args.html
    applicability:
      workloads: [vllm-decode]
      other: Helps tail latency under mixed priorities; neutral on uniform traffic.
    safety:
      tier: moderate
      requires_rollback_window_s: 120
      notes: Changes admission order; confirm no starvation before keep.
    review: null

  - name: attention_backend_flashinfer
    summary: Swap the attention backend to FlashInfer for fused decode attention.
    knob: VLLM_ATTENTION_BACKEND
    value: FLASHINFER
    applies_to_kernels: [paged_attention, attn_score_value]
    expected_delta_mean: 0.07
    expected_delta_lo: -0.03
    expected_delta_hi: 0.15
    source: https://docs.vllm.ai/en/latest/serving/engine_args.html
    applicability:
      workloads: [vllm-decode]
      requires_hardware: [A100, H100]
      requires_dtype: [fp16, bf16]
    safety:
      tier: high_risk
      requires_rollback_window_s: 180
      notes: Kernel swap; numerics differ slightly — gate on accuracy sentinel.
    review: null

  - name: disable_custom_all_reduce
    summary: Fall back to NCCL all-reduce when custom all-reduce stalls comm overlap.
    knob: disable_custom_all_reduce
    value: true
    applies_to_kernels: [all_reduce, nccl]
    expected_delta_mean: 0.02
    expected_delta_lo: -0.04
    expected_delta_hi: 0.08
    source: https://docs.vllm.ai/en/latest/serving/engine_args.html
    applicability:
      workloads: [vllm-decode]
      other: Only relevant with tensor_parallel_size > 1.
    safety:
      tier: moderate
      requires_rollback_window_s: 120
      notes: Comm-path change; verify the stream-concurrency invariant holds.
    review: null

  # --- Tier 3: harder levers (GITM-033) -------------------------------------
  - name: tensor_parallel_size_2
    summary: Reshape to TP=2 to fit larger batches / longer context per replica.
    knob: tensor_parallel_size
    value: 2
    applies_to_kernels: [all_reduce, linear, paged_attention]
    expected_delta_mean: 0.00
    expected_delta_lo: -0.15
    expected_delta_hi: 0.20
    source: https://docs.vllm.ai/en/latest/serving/distributed_serving.html
    applicability:
      workloads: [vllm-decode]
      requires_hardware: [A100, H100]
      other: Adds all-reduce per layer; only wins when memory-bound, not compute-bound.
    safety:
      tier: high_risk
      requires_qualification_commit: true
      requires_rollback_window_s: 300
      notes: Topology change; requires engine restart — heavy rollback, gate strictly.
    review: null

  - name: quantization_awq
    summary: Load AWQ 4-bit weights to shrink the model and free KV-cache memory.
    knob: quantization
    value: awq
    applies_to_kernels: [linear, gemm]
    expected_delta_mean: 0.10
    expected_delta_lo: -0.05
    expected_delta_hi: 0.25
    source: https://docs.vllm.ai/en/latest/features/quantization/auto_awq.html
    applicability:
      workloads: [vllm-decode]
      other: Requires an AWQ-quantized checkpoint; accuracy drop must be acceptable.
    safety:
      tier: high_risk
      requires_qualification_commit: true
      requires_rollback_window_s: 300
      notes: Different weights — full accuracy eval required before keep.
    review: null

  - name: cuda_graphs_enable
    summary: Disable enforce_eager so CUDA graphs capture and replay the decode step.
    knob: enforce_eager
    value: false
    applies_to_kernels: [decode, paged_attention, linear]
    expected_delta_mean: 0.09
    expected_delta_lo: 0.02
    expected_delta_hi: 0.18
    source: https://docs.vllm.ai/en/latest/configuration/optimization.html
    applicability:
      workloads: [vllm-decode]
      other: Helps launch-bound small-batch decode; needs stable, capturable shapes.
    safety:
      tier: moderate
      requires_rollback_window_s: 180
      notes: Graph capture raises warmup memory; watch for OOM on first capture.
    review: null

  - name: max_seq_len_to_capture_8192
    summary: Extend CUDA-graph capture to 8192 tokens so long contexts stay graphed.
    knob: max_seq_len_to_capture
    value: 8192
    applies_to_kernels: [decode, paged_attention]
    expected_delta_mean: 0.04
    expected_delta_lo: -0.02
    expected_delta_hi: 0.10
    source: https://docs.vllm.ai/en/latest/serving/engine_args.html
    applicability:
      workloads: [vllm-decode]
      min_kv_cache_len: 2048
      other: Only matters when sequences exceed the default capture length.
    safety:
      tier: moderate
      requires_rollback_window_s: 180
      notes: More captured graphs => more warmup memory; gate on OOM history.
    review: null

  - name: pipeline_parallel_size_2
    summary: Split layers across 2 pipeline stages to fit a model that won't shard on TP alone.
    knob: pipeline_parallel_size
    value: 2
    applies_to_kernels: [send_recv, linear]
    expected_delta_mean: -0.02
    expected_delta_lo: -0.20
    expected_delta_hi: 0.15
    source: https://docs.vllm.ai/en/latest/serving/distributed_serving.html
    applicability:
      workloads: [vllm-decode]
      requires_hardware: [A100, H100]
      other: Pipeline bubbles hurt low-batch decode; mainly a memory-fit lever.
    safety:
      tier: high_risk
      requires_qualification_commit: true
      requires_rollback_window_s: 300
      notes: Topology change with restart; only when a single replica cannot fit.
    review: null

  - name: distributed_executor_ray
    summary: Use the Ray executor backend for multi-node distributed decode.
    knob: distributed_executor_backend
    value: ray
    applies_to_kernels: []
    expected_delta_mean: 0.00
    expected_delta_lo: -0.10
    expected_delta_hi: 0.05
    source: https://docs.vllm.ai/en/latest/serving/distributed_serving.html
    applicability:
      workloads: [vllm-decode]
      other: Only relevant for multi-node; adds Ray scheduling overhead single-node.
    safety:
      tier: high_risk
      requires_qualification_commit: true
      requires_rollback_window_s: 300
      notes: Execution-backend swap with restart; validate end-to-end before keep.
    review: null
